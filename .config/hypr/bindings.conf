# Application bindings
bindd = SUPER, RETURN, Terminal, exec, alacritty --config-file ~/.config/alacritty/transparent.toml --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
# bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, N, Editor, exec, alacritty --config-file ~/.config/alacritty/transparent.toml --working-directory="$(omarchy-cmd-terminal-cwd)" -e nvim

# Add extra bindings
bindd = SUPER SHIFT, E, Protonmail, exec, omarchy-launch-or-focus-webapp Protonmail "https://mail.proton.me/"
bindd = SUPER SHIFT, M, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"   
bindd = SUPER SHIFT, G, Steam, exec, uwsm app -- steam

# macOS-style screenshots
bindd = SUPER CTRL, 3, Screenshot fullscreen to clipboard, exec, omarchy-capture-screenshot fullscreen
bindd = SUPER CTRL, 4, Screenshot area with editing, exec, omarchy-capture-screenshot region

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
